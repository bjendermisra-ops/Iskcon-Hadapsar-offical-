<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISKCON Admin - Ultra Premium</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #FF9933; --bg-dark: #050505; --card-glass: rgba(20, 20, 20, 0.85); --glow: 0 0 20px rgba(255, 153, 51, 0.4); }
        body { background-color: var(--bg-dark); font-family: 'Poppins', sans-serif; color: white; margin: 0; min-height: 100vh; background-image: radial-gradient(circle at top right, #1a1005 0%, transparent 50%); }

        /* Login Screen */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 2000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .login-box { background: var(--card-glass); border: 1px solid rgba(255,153,51,0.4); padding: 40px; border-radius: 20px; box-shadow: var(--glow); width: 90%; max-width: 400px; text-align: center; }
        .login-box h2 { font-family: 'Cinzel', serif; color: var(--primary); margin-bottom: 25px; font-weight: 800; letter-spacing: 1px;}

        /* Admin Header */
        .admin-header { background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(20px); padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255, 153, 51, 0.2); }
        .admin-header h1 { font-family: 'Cinzel', serif; color: white; margin: 0; font-size: 1.6rem; text-shadow: 0 2px 10px rgba(255,153,51,0.5); }
        .btn-logout { background: rgba(255, 71, 87, 0.1); border: 1px solid #ff4757; color: #ff4757; padding: 8px 20px; border-radius: 30px; transition: 0.3s; font-weight: 600;}
        .btn-logout:hover { background: #ff4757; color: white; box-shadow: 0 0 15px rgba(255,71,87,0.5); }

        /* Main Container */
        .admin-container { max-width: 900px; margin: 40px auto; background: var(--card-glass); padding: 40px; border-radius: 25px; border: 1px solid rgba(255, 153, 51, 0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        
        .form-label { font-weight: 500; color: #ddd; font-size: 0.9rem; margin-bottom: 8px; display: block; letter-spacing: 0.5px;}
        .form-control, .form-select { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 12px; padding: 14px; width: 100%; transition: 0.3s; }
        .form-control:focus, .form-select:focus { background: rgba(255, 255, 255, 0.08); border-color: var(--primary); outline: none; box-shadow: 0 0 10px rgba(255,153,51,0.2); }
        ::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        /* Image Upload Box */
        .upload-box { position: relative; width: 100%; height: 250px; border: 2px dashed rgba(255,153,51,0.5); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255,153,51,0.05); cursor: pointer; transition: 0.3s; overflow: hidden; margin-bottom: 20px;}
        .upload-box:hover { background: rgba(255,153,51,0.1); border-color: var(--primary); }
        .upload-box i { font-size: 3rem; color: var(--primary); margin-bottom: 10px; }
        .upload-box p { color: #aaa; font-size: 0.95rem; margin:0;}
        .upload-box input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .upload-box img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; background: #000; display: none; z-index: 10; }

        /* Buttons */
        .btn-publish { background: linear-gradient(45deg, #FF9933, #e67300); border: none; color: white; width: 100%; padding: 16px; border-radius: 15px; font-size: 1.2rem; font-family: 'Cinzel', serif; font-weight: 800; text-transform: uppercase; margin-top: 25px; transition: 0.3s; box-shadow: var(--glow); cursor: pointer;}
        .btn-publish:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255,153,51,0.6); }
        .btn-publish:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        .status-badge { display: none; text-align: center; padding: 15px; border-radius: 10px; margin-top: 20px; font-weight: 600; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

        /* Management List */
        .manage-gallery { margin-top: 50px; border-top: 1px solid rgba(255, 153, 51, 0.2); padding-top: 30px; }
        .gallery-item-admin { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;}
        .gallery-item-admin:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,153,51,0.3); }
        .gallery-item-admin img { width: 70px; height: 70px; object-fit: cover; border-radius: 10px; margin-right: 15px; border: 1px solid rgba(255,153,51,0.5); }
        .item-info { flex-grow: 1; }
        .item-title { font-size: 1.05rem; font-weight: 600; margin: 0; color: #fff;}
        .item-date { font-size: 0.8rem; color: var(--primary); background: rgba(255,153,51,0.1); padding: 2px 8px; border-radius: 20px; margin-top: 5px; display: inline-block;}
        .btn-delete { background: rgba(255,71,87,0.2); color: #ff4757; border: 1px solid #ff4757; padding: 8px 15px; border-radius: 10px; cursor: pointer; transition: 0.3s;}
        .btn-delete:hover { background: #ff4757; color: white; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2><i class="fas fa-shield-alt"></i> Admin Vault</h2>
            <input type="email" id="adminEmail" class="form-control mb-4" placeholder="Email Address" required>
            <input type="password" id="adminPassword" class="form-control mb-4" placeholder="Password" required>
            <button id="btnLogin" class="btn-publish" style="margin-top: 0; padding: 12px; font-size: 1rem;">Authenticate</button>
            <p id="loginError" style="color:#ff4757; display:none; margin-top: 15px;">Invalid Credentials!</p>
        </div>
    </div>

    <div id="admin-dashboard">
        <div class="admin-header">
            <div>
                <h1><i class="fas fa-om text-warning"></i> ISKCON Hub</h1>
                <p class="mb-0 text-white-50" style="font-size: 0.85rem;">Fast API Image Uploader</p>
            </div>
            <button class="btn-logout" id="btnLogout"><i class="fas fa-sign-out-alt"></i> Exit</button>
        </div>

        <div class="container">
            <div class="admin-container">
                <h3 style="font-family: 'Cinzel'; color: var(--primary); margin-bottom: 25px; border-bottom: 1px solid rgba(255,153,51,0.2); padding-bottom: 10px;">
                    <i class="fas fa-cloud-upload-alt"></i> Publish New Darshan
                </h3>
                
                <form id="uploadForm">
                    <!-- Advanced Image Uploader -->
                    <div class="upload-box" id="dropZone">
                        <i class="fas fa-images"></i>
                        <p>Click or Drop Darshan Image Here</p>
                        <input type="file" id="imageFile" accept="image/*" required>
                        <img id="previewImg" src="" alt="Preview">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label"><i class="far fa-calendar-check"></i> Darshan Date</label>
                            <input type="date" id="darshanDate" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label"><i class="fas fa-layer-group"></i> Category</label>
                            <select id="category" class="form-select" required>
                                <option value="daily">Daily Darshan</option>
                                <option value="festival">Festivals</option>
                                <option value="event">Special Events</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mt-2">
                        <div class="col-md-4 mb-3"><label class="form-label">Title (English)</label><input type="text" id="title_en" class="form-control" placeholder="E.g. Main Altar" required></div>
                        <div class="col-md-4 mb-3"><label class="form-label">शीर्षक (Hindi)</label><input type="text" id="title_hi" class="form-control" placeholder="मुख्य वेदी" required></div>
                        <div class="col-md-4 mb-3"><label class="form-label">शीर्षक (Marathi)</label><input type="text" id="title_mr" class="form-control" placeholder="मुख्य वेदी" required></div>
                    </div>

                    <button type="submit" class="btn-publish" id="submitBtn">
                        <i class="fas fa-paper-plane"></i> Upload & Publish to App
                    </button>
                    <div class="status-badge" id="statusText"></div>
                </form>

                <!-- Manage Section -->
                <div class="manage-gallery">
                    <h3 style="font-family: 'Cinzel'; color: white; margin-bottom: 20px;"><i class="fas fa-tasks text-warning"></i> Recent Uploads</h3>
                    <div id="adminGalleryList"><p style="color: #888;">Loading...</p></div>
                </div>
            </div>
        </div>
    </div>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEbzUad0edV07OMF2slPJyJeWd10-Clc8",
            authDomain: "image-hit-7ce47.firebaseapp.com",
            databaseURL: "https://image-hit-7ce47-default-rtdb.firebaseio.com",
            projectId: "image-hit-7ce47"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 🔥 YAHAN APNA IMGBB API KEY DAALEIN 🔥
        const IMGBB_API_KEY = "0ccc2c1efc566b4794dc362ab4602952"; 

        document.getElementById('darshanDate').value = new Date().toISOString().split('T')[0];

        // Auth Logic
        onAuthStateChanged(auth, (user) => {
            if (user) { document.getElementById('login-screen').style.display = 'none'; document.getElementById('admin-dashboard').style.display = 'block'; loadRecentUploads(); } 
            else { document.getElementById('login-screen').style.display = 'flex'; document.getElementById('admin-dashboard').style.display = 'none'; }
        });
        document.getElementById('btnLogin').addEventListener('click', async () => {
            try { await signInWithEmailAndPassword(auth, document.getElementById('adminEmail').value, document.getElementById('adminPassword').value); } 
            catch (e) { document.getElementById('loginError').style.display = 'block'; }
        });
        document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

        // Image Preview
        const imageFile = document.getElementById('imageFile');
        const previewImg = document.getElementById('previewImg');
        imageFile.addEventListener('change', function() {
            if (this.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { previewImg.src = e.target.result; previewImg.style.display = 'block'; }
                reader.readAsDataURL(this.files[0]);
            }
        });

        // Submit & Upload
        const form = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusText = document.getElementById('statusText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = imageFile.files[0];
            if(!file) return alert("Select an image first!");

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading to Cloud...';
            statusText.style.display = "block";
            statusText.style.background = "rgba(255,153,51,0.2)";
            statusText.style.color = "var(--primary)";
            statusText.innerHTML = "Step 1: Uploading secure image to ImgBB...";

            try {
                // 1. Upload to ImgBB
                const formData = new FormData();
                formData.append("image", file);
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                const data = await response.json();
                if (!data.success) throw new Error("API Upload Failed");

                // 2. Save Text to Firebase
                statusText.innerHTML = "Step 2: Syncing with Mobile App...";
                await addDoc(collection(db, "iskcon_images"), {
                    imageUrl: data.data.url, width: data.data.width, height: data.data.height,
                    darshan_date: document.getElementById('darshanDate').value,
                    category: document.getElementById('category').value,
                    title_en: document.getElementById('title_en').value,
                    title_hi: document.getElementById('title_hi').value,
                    title_mr: document.getElementById('title_mr').value,
                    timestamp: serverTimestamp()
                });

                statusText.style.background = "rgba(46, 213, 115, 0.2)";
                statusText.style.color = "#2ed573";
                statusText.innerHTML = "✅ Live on App Successfully!";
                form.reset(); previewImg.style.display = 'none';
                document.getElementById('darshanDate').value = new Date().toISOString().split('T')[0];
                
            } catch (err) { 
                statusText.style.background = "rgba(255, 71, 87, 0.2)";
                statusText.style.color = "#ff4757";
                statusText.innerHTML = "❌ Error: " + err.message; 
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Upload & Publish to App';
                setTimeout(() => { statusText.style.display = "none"; }, 5000);
            }
        });

        // Load Management List
        function loadRecentUploads() {
            const q = query(collection(db, "iskcon_images"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('adminGalleryList'); list.innerHTML = '';
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    list.innerHTML += `
                        <div class="gallery-item-admin">
                            <div style="display:flex; align-items:center;">
                                <img src="${data.imageUrl}" alt="img">
                                <div class="item-info">
                                    <p class="item-title">${data.title_en}</p>
                                    <span class="item-date"><i class="far fa-calendar"></i> ${data.darshan_date}</span>
                                </div>
                            </div>
                            <button class="btn-delete" onclick="deleteDocItem('${docSnap.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                });
            });
        }
        window.deleteDocItem = async (id) => {
            if(confirm("Delete this Darshan from App?")) await deleteDoc(doc(db, "iskcon_images", id));
        };
    </script>
</body>
</html>
